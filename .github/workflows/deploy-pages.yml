name: Deploy to GitHub Pages

# 엔진 wheel 빌드 → 프론트엔드(Vite) 빌드 → GitHub Pages 정적 배포.
# 완전 클라이언트 사이드(Pyodide)라 서버 불필요.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install & run engine tests (배포 전 품질 게이트)
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pytest
          python -m pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build engine wheel (순수 Python, Pyodide 호환)
        run: |
          python -m pip install --upgrade pip
          python -m pip wheel . --no-deps -w dist
          mkdir -p frontend/public
          cp dist/station_congestion_simulator-*.whl frontend/public/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
